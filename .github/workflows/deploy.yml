name: Deploy

on:
  push:
    branches: [main]

jobs:
  unitario:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: cd backend && npx prisma generate

      - run: npm run test:unitario

  integracao:
    name: Testes de integração
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://tally:tally_secret@localhost:5432/tally_db_teste?schema=public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tally
          POSTGRES_PASSWORD: tally_secret
          POSTGRES_DB: tally_db_teste
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tally -d tally_db_teste"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: cd backend && npx prisma generate

      - run: npm run test:integracao

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [unitario, integracao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefix frontend

      - run: VITE_API_URL=https://viniciusdias.tech/tally/api npm run build --prefix frontend

      - name: Enviar build para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/tally/app"
          strip_components: 2

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: [unitario, integracao]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/tally
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
