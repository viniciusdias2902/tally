# Bloco para adicionar ao nginx do host (dentro do server {} existente).
# Faz reverse proxy de /tally/api para o container da API.
#
# Exemplo de uso:
#   sudo cp docker/prod/nginx.conf /etc/nginx/sites-available/tally
#   sudo ln -s /etc/nginx/sites-available/tally /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

location /tally/api/ {
  proxy_pass         http://127.0.0.1:3000/;
  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
}
