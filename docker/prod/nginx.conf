events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
  }

  # Limita requisições por IP para mitigar brute-force
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  server {
    listen 80;
    server_name _;

    # Oculta versão do nginx
    server_tokens off;

    # Cabeçalhos de segurança
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "no-referrer"     always;

    location / {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # Para habilitar HTTPS, adicione um segundo bloco server com ssl_certificate
  # e redirecione o bloco HTTP acima para 301 https://$host$request_uri
}
