services:
  postgres:
    image: postgres:17-alpine
    container_name: tally-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Porta não exposta para fora da rede Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tally-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tally-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    # Porta não exposta para fora da rede Docker – tráfego passa pelo nginx
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tally-net

  nginx:
    image: nginx:alpine
    container_name: tally-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - tally-net

volumes:
  pgdata:

networks:
  tally-net:
    driver: bridge
