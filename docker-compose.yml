services:
  postgres:
    image: postgres:17-alpine
    container_name: tally-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally_secret
      POSTGRES_DB: tally_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/dev/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  pgdata:
